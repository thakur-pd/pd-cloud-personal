## PD Cloud Personal — Nginx reverse proxy
## Drop in /etc/nginx/sites-available/pdcloud  →  symlink into sites-enabled
## Replace server_name with your domain. Run certbot to enable HTTPS.

# Rate-limit login attempts (10 req / minute)
limit_req_zone $binary_remote_addr zone=pdlogin:10m rate=10r/m;

upstream pdcloud_backend {
    server 127.0.0.1:@PORT@;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 500M;
    server_tokens off;

    # Security headers (kept in sync with FastAPI app)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Login endpoint — extra rate limit
    location = /api/auth/login {
        limit_req zone=pdlogin burst=5 nodelay;
        proxy_pass http://pdcloud_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API + SPA
    location / {
        proxy_pass http://pdcloud_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Long-running file uploads / downloads
    location ~ ^/api/files/(upload|download)$ {
        proxy_pass http://pdcloud_backend;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 2G;
    }
}

