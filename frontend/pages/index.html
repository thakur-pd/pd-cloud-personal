<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>PD Cloud Personal</title>

  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg" />

  <!-- Bootstrap 5 (full functionality only in browser; preview shows base UI without external assets) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="/static/css/theme.css" rel="stylesheet" />
</head>
<body>

  <!-- ====== LOGIN SCREEN ====== -->
  <div id="loginScreen" class="login-screen" style="display:none">
    <div class="login-card">
      <div class="brand">
        <div class="logo" style="width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#58e6ba,#10b981);display:grid;place-items:center;color:#fff;">
          <i class="bi bi-cloud-fill" style="font-size:22px"></i>
        </div>
        PD Cloud <span style="color:var(--mint-600)">Personal</span>
      </div>
      <p style="color:var(--text-muted);margin-bottom:24px">Sign in to your control panel</p>
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" id="loginUser" required autocomplete="username" />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="loginPass" required autocomplete="current-password" />
        </div>
        <div id="loginError" style="display:none;color:#b91c1c;font-size:13px;margin-bottom:12px;"></div>
        <button type="submit" class="btn-pd primary w-100" style="justify-content:center">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
      </form>
      <p style="text-align:center;color:var(--text-faint);font-size:11px;margin-top:20px;">
        Secured with JWT · Rate-limited · Audit-logged
      </p>
    </div>
  </div>

  <!-- ====== APP LAYOUT ====== -->
  <div id="appLayout" class="layout" style="display:none">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo"><i class="bi bi-cloud-fill"></i></div>
        <span>PD Cloud</span>
      </div>

      <div class="nav-section">Overview</div>
      <div class="nav-link active" data-page="dashboard"><i class="bi bi-speedometer2"></i> Dashboard</div>
      <div class="nav-link" data-page="monitoring"><i class="bi bi-graph-up"></i> Monitoring</div>

      <div class="nav-section">Hosting</div>
      <div class="nav-link" data-page="apps"><i class="bi bi-box-seam"></i> Applications</div>
      <div class="nav-link" data-page="docker"><i class="bi bi-hdd-stack"></i> Docker</div>
      <div class="nav-link" data-page="databases"><i class="bi bi-database"></i> Databases</div>

      <div class="nav-section">System</div>
      <div class="nav-link" data-page="files"><i class="bi bi-folder2-open"></i> File Manager</div>
      <div class="nav-link" data-page="terminal"><i class="bi bi-terminal"></i> Terminal</div>
      <div class="nav-link" data-page="backups"><i class="bi bi-cloud-arrow-down"></i> Backups</div>

      <div class="nav-section">Account</div>
      <div class="nav-link" data-page="activity"><i class="bi bi-clock-history"></i> Activity</div>
      <div class="nav-link" data-page="settings"><i class="bi bi-gear"></i> Settings</div>
      <div class="nav-link" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Sign Out</div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="topbar">
        <button class="icon-btn menu-toggle" id="menuToggle"><i class="bi bi-list"></i></button>
        <div class="title" id="pageTitle">Dashboard</div>
        <div style="display:flex;align-items:center;gap:6px;color:var(--text-muted);font-size:12.5px;">
          <span class="live-dot"></span> Live
        </div>
        <button class="icon-btn" id="themeToggle" title="Toggle theme">
          <i class="bi bi-moon-stars"></i>
        </button>
        <div class="d-none d-sm-flex" style="align-items:center;gap:8px;padding:0 8px;color:var(--text-muted);font-size:13px;">
          <i class="bi bi-person-circle" style="font-size:20px;color:var(--mint-600);"></i>
          <span id="currentUser">—</span>
        </div>
      </div>

      <div class="content" id="content">
        <!-- Pages are injected by app.js -->
      </div>
    </main>
  </div>

  <!-- ====== MODAL ====== -->
  <div class="modal-backdrop-pd" id="modal">
    <div class="modal-pd">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <h5 style="margin:0;font-weight:700;" id="modalTitle">Title</h5>
        <button class="icon-btn" onclick="PD.closeModal()"><i class="bi bi-x-lg"></i></button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- ====== TOASTS ====== -->
  <div id="toast" class="toast-pd"></div>

  <!-- Bootstrap JS bundle (no jQuery required) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Chart.js for live graphs -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- App scripts -->
  <script src="/static/js/api.js"></script>
  <script src="/static/js/ui.js"></script>
  <script src="/static/js/pages.js"></script>
  <script src="/static/js/app.js"></script>

</html>
